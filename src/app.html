				console.log('[perf] Full load at', (performance.now() - window.__perf.start).toFixed(1) + 'ms');

					var nav = performance.getEntriesByType('navigation')[0];
					if (nav) {
						console.log('[perf] TTFB:', nav.responseStart.toFixed(1) + 'ms');
						console.log('[perf] DOM Interactive:', nav.domInteractive.toFixed(1) + 'ms');
						console.log('[perf] DOM Complete:', nav.domComplete.toFixed(1) + 'ms');
					}
					var resources = performance.getEntriesByType('resource');
					var slow = resources.filter(function(r) { return r.duration > 100; })
						.sort(function(a, b) { return b.duration - a.duration; })
						.slice(0, 5);
					if (slow.length) {
						console.log('[perf] Slowest resources:');
						slow.forEach(function(r) {
							console.log('  ' + r.duration.toFixed(0) + 'ms - ' + r.name.split('/').pop());
						});
					}
				}
			});
